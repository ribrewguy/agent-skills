title: RI Brew Guy's AI Agent Skills
description: A collection of skills for AI coding tools (Claude Code, Gemini CLI, OpenAI Codex, GitHub Copilot CLI, Cline, and others). The SKILL.md format works across all of them.

remote_theme: just-the-docs/just-the-docs@v0.10.1

plugins:
  - jekyll-remote-theme
  - jekyll-relative-links

color_scheme: light

# Generate directory-style URLs (`/install/claude-code/` rather than
# `/install/claude-code.html`) so trailing-slash and bare paths both resolve.
# Just-the-docs nav and jekyll-relative-links both respect this setting.
permalink: pretty

# Search is one of the main reasons we switched themes. Turn it on with sane defaults.
search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s\-/]+/
  rel_url: true
  button: false

# Top-right links above the search bar.
aux_links:
  "GitHub":
    - "https://github.com/ribrewguy/agent-skills"
aux_links_new_tab: false

# Footer
footer_content: 'Released under <a href="https://github.com/ribrewguy/agent-skills/blob/main/LICENSE">MIT</a>. Built with <a href="https://just-the-docs.com">Just the Docs</a>.'

# Make .md → .html links resolve without explicit .html in the markdown.
relative_links:
  enabled: true
  collections: true

# Don't ship dev-time files, eval artifacts, plugin internals, or AI-agent SKILL.md files
# in the rendered site. The plugins/ tree is the canonical source of skills, but human
# docs live under /skills/ as their own pages.
exclude:
  - .gitignore
  - .git
  - .DS_Store
  - "*.swp"
  - plugins/
  - "plugins/**/evals/"
  - "**/.claude-plugin/"
  # Eval workspace markdown is model-generated and frequently contains
  # `{{var}}` strings (e.g., reviewing a Liquid-style template renderer)
  # that crash Jekyll's Liquid parser. Exclude all .md / .json / .txt
  # files in the workspaces; only the review.html viewers need to be
  # served by Pages, and they're plain HTML with no Liquid issues.
  # Workspace markdown files are linked via GitHub URLs from the eval
  # docs pages, not via the Pages site.
  - "skills/cross-agent-review-workspace/**/*.md"
  - "skills/cross-agent-review-workspace/**/*.json"
  - "skills/cross-agent-review-workspace/**/*.txt"
  - "skills/multi-agent-git-workflow-workspace/**/*.md"
  - "skills/multi-agent-git-workflow-workspace/**/*.json"
  - "skills/rest-api-design-workspace/**/*.md"
  - "skills/rest-api-design-workspace/**/*.json"
  - "skills/structured-code-review-workspace/**/*.md"
  - "skills/structured-code-review-workspace/**/*.json"
  - "skills/task-handoff-summaries-workspace/**/*.md"
  - "skills/task-handoff-summaries-workspace/**/*.json"
  - "skills/branch-promotion-discipline-workspace/**/*.md"
  - "skills/branch-promotion-discipline-workspace/**/*.json"

markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

# Just the Docs callouts. Use as `{: .note }`, `{: .warning }`, `{: .important }` after a paragraph.
callouts_level: quiet
callouts:
  note:
    title: Note
    color: blue
  important:
    title: Important
    color: yellow
  warning:
    title: Warning
    color: red
  tip:
    title: Tip
    color: green

# Ordered top-level pages. index.md doesn't show in the sidebar (just-the-docs default).
heading_anchors: true
back_to_top: true
back_to_top_text: "Back to top"

# Per-path defaults. Eval workspace markdown (raw model outputs) ships in the
# repo for transparency but must NOT pollute the sidebar nav or search results.
# The interactive review.html viewers under skills/*-workspace/ remain reachable
# at their direct URLs.
defaults:
  - scope:
      path: "skills/cross-agent-review-workspace"
    values:
      nav_exclude: true
      search_exclude: true
  - scope:
      path: "skills/multi-agent-git-workflow-workspace"
    values:
      nav_exclude: true
      search_exclude: true
  - scope:
      path: "skills/rest-api-design-workspace"
    values:
      nav_exclude: true
      search_exclude: true
  - scope:
      path: "skills/structured-code-review-workspace"
    values:
      nav_exclude: true
      search_exclude: true
  - scope:
      path: "skills/task-handoff-summaries-workspace"
    values:
      nav_exclude: true
      search_exclude: true
  - scope:
      path: "skills/branch-promotion-discipline-workspace"
    values:
      nav_exclude: true
      search_exclude: true
